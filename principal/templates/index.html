<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Simple con JWT</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f4; margin: 0; }
        .login-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .message { margin-top: 15px; font-size: 0.9em; text-align: center; }
        .success { color: green; }
        .error { color: red; }
        #tokenDisplay { word-break: break-all; white-space: pre-wrap; font-size: 0.8em; margin-top: 10px; color: #555; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Login con JWT</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="username">Usuario:</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="password">Contrasena:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">Ingresar</button>
    </form>
    <div id="message" class="message"></div>
    <div id="tokenDisplay"></div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const messageBox = document.getElementById('message');
        const tokenDisplay = document.getElementById('tokenDisplay');

        messageBox.textContent = 'Procesando...';
        messageBox.className = 'message';
        tokenDisplay.textContent = '';

        try {
            const response = await fetch('/api/auth/login/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok) {
                localStorage.setItem('access_token', data.access);
                localStorage.setItem('refresh_token', data.refresh);

                messageBox.textContent = 'Login exitoso';
                messageBox.className = 'message success';

                tokenDisplay.innerHTML = '<strong>Token Guardado:</strong><br>' + data.access;
            } else {
                messageBox.textContent = 'Error: ' + (data.detail || 'Credenciales invalidas');
                messageBox.className = 'message error';
            }
        } catch (error) {
            messageBox.textContent = 'Error de conexion con el servidor.';
            messageBox.className = 'message error';
            console.error('Error:', error);
        }
    });
</script>

</body>
</html>
